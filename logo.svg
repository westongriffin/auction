<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-label="Brinkley Auctions Inc.">
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e42328"/>
      <stop offset="1" stop-color="#8e1013"/>
    </linearGradient>
  </defs>

  <!-- rear wheel with lugs -->
  <g fill="url(#red)">
    <g transform="translate(210,460)">
      <circle r="205"/>
      <g>
        <rect x="-26" y="-242" width="52" height="50" rx="6"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(30)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(60)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(90)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(120)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(150)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(180)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(210)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(240)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(270)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(300)"/>
        <rect x="-26" y="-242" width="52" height="50" rx="6" transform="rotate(330)"/>
      </g>
    </g>

    <!-- canopy -->
    <path d="M 175 15 L 575 15 L 630 105 L 120 105 Z"/>
    <!-- canopy posts -->
    <rect x="185" y="105" width="46" height="180"/>
    <rect x="490" y="105" width="46" height="180"/>
    <!-- cab block -->
    <path d="M 150 215 Q 150 195 170 195 L 560 195 L 575 320 L 150 320 Z"/>
    <!-- exhaust stack -->
    <path d="M 668 55 L 702 55 L 710 125 L 726 135 L 726 320 L 644 320 L 644 135 L 660 125 Z"/>
    <!-- main body -->
    <path d="M 155 400 Q 160 302 260 296 L 880 264 Q 955 262 955 335 L 955 515 Q 955 578 892 588 L 320 634 Q 160 644 155 520 Z"/>
    <!-- front wheel -->
    <circle cx="815" cy="545" r="145"/>
  </g>

  <!-- cab window (white cutout) -->
  <path d="M 262 135 L 465 135 L 488 265 L 262 258 Z" fill="#fff"/>

  <!-- lettering -->
  <path id="arcMain" d="M 90 512 Q 500 396 960 486" fill="none"/>
  <path id="arcSub" d="M 200 600 Q 520 522 880 586" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#fff">
    <textPath href="#arcMain" startOffset="50%" text-anchor="middle" font-size="138">BRINKLEY</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#fff" letter-spacing="12">
    <textPath href="#arcSub" startOffset="47%" text-anchor="middle" font-size="62">AUCTIONS</textPath>
  </text>
  <text x="856" y="614" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="50" fill="#fff" text-anchor="middle">INC.</text>
</svg>
