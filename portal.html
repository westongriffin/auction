<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brinkley Auctions — Customer Portal</title>
<link rel="icon" href="logo-small.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<style>
  .portal-header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 20px;
    background: linear-gradient(180deg, rgba(45, 33, 27, 0.97), rgba(26, 18, 15, 0.97));
    border-top: 4px solid var(--accent);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .portal-header .brand { display: flex; align-items: center; gap: 12px; }
  .portal-header .logo { height: 42px; }
  .portal-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 18px;
    color: #f6ede5;
  }
  .portal-header h1 span { display: block; font-size: 11px; font-weight: 400; color: #cdb8ab; letter-spacing: 0.08em; text-transform: uppercase; }
  #signout { background: none; color: #c9b5a8; border-color: rgba(255,255,255,0.3); box-shadow: none; }
  #signout:hover { color: #fff; border-color: #fff; }
  main.portal { max-width: 880px; }
  .gate-card { max-width: 420px; margin: 8vh auto 0; text-align: center; }
  .gate-card img { max-width: 200px; margin-bottom: 6px; }
  .gate-card h2 { font-size: 22px; }
  .gate-card input {
    width: 100%;
    text-align: center;
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 10px 0;
  }
  .gate-card .primary { width: 100%; padding: 12px; font-size: 16px; }
  #gate-error { color: var(--red); min-height: 20px; margin-top: 8px; }
  .demo-hint { margin-top: 16px; font-size: 13px; color: var(--muted); background: var(--panel-2); border: 1px dashed var(--line-strong); border-radius: 10px; padding: 10px; }
  .demo-hint code { font-weight: 700; color: var(--accent-dark); }
  .greeting { margin: 4px 0 18px; }
  .greeting .sub { font-size: 14px; }
  .lot-card { border-bottom: 1px solid var(--line); padding: 10px 0; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .lot-card:last-child { border-bottom: none; }
  .lot-main { flex: 1 1 240px; }
  .lot-side { text-align: right; flex: 0 0 auto; }
  details.auction-cat { margin-bottom: 12px; }
  details.auction-cat > summary {
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }
  details.auction-cat[open] > summary { border-radius: var(--radius) var(--radius) 0 0; }
  details.auction-cat > div { background: var(--panel); border: 1px solid var(--line); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 4px 14px; }
  .mybid { color: var(--green); font-weight: 600; font-size: 13px; }
</style>
</head>
<body>
<header class="portal-header">
  <div class="brand">
    <img src="logo-small.png" alt="Brinkley Auctions" class="logo">
    <h1>Brinkley Auctions<span>Customer portal</span></h1>
  </div>
  <button id="signout" class="small hidden">Sign out</button>
</header>

<main class="portal">
  <div id="gate">
    <div class="panel gate-card">
      <img src="logo-small.png" alt="">
      <h2>Welcome</h2>
      <p class="sub">Enter the access code from the auction office to see your account.</p>
      <input id="code-input" placeholder="XXXX-XXXX" autocomplete="off" autocapitalize="characters">
      <button class="primary" id="code-go">View my account</button>
      <div id="gate-error"></div>
      <div id="demo-hint" class="demo-hint hidden"></div>
    </div>
  </div>
  <div id="portal-view" class="hidden"></div>
</main>

<dialog id="bid-modal">
  <form id="bid-form" method="dialog">
    <h3 id="bid-title"></h3>
    <div class="form-grid">
      <p class="sub" id="bid-context"></p>
      <label>Your maximum bid ($)
        <input name="amount" type="number" step="0.01" min="0" required>
      </label>
      <p class="sub">The office bids on your behalf up to this amount. A buyer's premium applies to winning bids.</p>
    </div>
    <div class="modal-actions">
      <button type="button" id="bid-cancel">Cancel</button>
      <button class="primary" type="submit">Place bid</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast hidden"></div>

<script src="core.js"></script>
<script src="demo-data.js"></script>
<script>
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const money = (n) => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (s) => (s ? new Date(s + (s.length === 10 ? 'T12:00:00' : '')).toLocaleDateString() : '');
const badge = (s) => `<span class="badge ${esc(s)}">${esc(s)}</span>`;

let toastTimer;
function toast(msg, isError = false) {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 3500);
}

// ---- api with demo-mode fallback (same pattern as the main app) ----
let demoCore = null;
function ensureDemoCore() {
  if (!demoCore) {
    demoCore = createBrinkleyCore({
      load() {
        try { return JSON.parse(localStorage.getItem('brinkley-demo-db')) || window.BRINKLEY_DEMO_DB; }
        catch { return window.BRINKLEY_DEMO_DB; }
      },
      save(d) {
        try { localStorage.setItem('brinkley-demo-db', JSON.stringify(d)); } catch { /* in-memory only */ }
      },
    });
    $('#demo-hint').classList.remove('hidden');
  }
  return demoCore;
}
function demoApi(method, path, body) {
  const url = new URL(path, location.origin);
  const r = ensureDemoCore().dispatch(method, url.pathname, body || {}, Object.fromEntries(url.searchParams));
  if (!r) throw new Error('Unavailable');
  if (r.status >= 400) throw new Error(r.body.error || 'Request failed');
  return JSON.parse(JSON.stringify(r.body));
}
async function api(method, path, body) {
  if (demoCore) return demoApi(method, path, body);
  let res;
  try {
    res = await fetch(path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
  } catch { return demoApi(method, path, body); }
  const ct = res.headers.get('content-type') || '';
  if (!ct.includes('json')) return demoApi(method, path, body);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function showDemoHintCodes() {
  try {
    const db = ensureDemoCore().db;
    const b = db.bidders.find((x) => x.portalCode);
    const c = db.consignors.find((x) => x.portalCode);
    $('#demo-hint').innerHTML = `<strong>Demo portal.</strong> Try a sample code —
      buyer: <code>${esc(b ? b.portalCode : '?')}</code> (${esc(b ? b.name : '')}) ·
      seller: <code>${esc(c ? c.portalCode : '?')}</code> (${esc(c ? c.name : '')})`;
  } catch { /* no demo data available */ }
}

// ---- sign in ----
let CODE = localStorage.getItem('brinkley-portal-code') || '';

async function signIn(code) {
  const who = await api('GET', `/api/portal/lookup?code=${encodeURIComponent(code)}`);
  CODE = code;
  localStorage.setItem('brinkley-portal-code', code);
  $('#gate').classList.add('hidden');
  $('#portal-view').classList.remove('hidden');
  $('#signout').classList.remove('hidden');
  if (who.type === 'bidder') await renderBidderPortal();
  else await renderConsignorPortal();
}

$('#code-go').addEventListener('click', async () => {
  const code = $('#code-input').value.trim().toUpperCase();
  if (!code) return;
  try {
    $('#gate-error').textContent = '';
    await signIn(code);
  } catch (err) {
    $('#gate-error').textContent = err.message;
  }
});
$('#code-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#code-go').click(); });
$('#signout').addEventListener('click', () => {
  localStorage.removeItem('brinkley-portal-code');
  location.reload();
});

// ---- bidder portal ----
const statTiles = (pairs) => `<div class="stat-grid">${pairs.map(([l, v, cls]) =>
  `<div class="stat ${cls || ''}"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('')}</div>`;

async function renderBidderPortal() {
  const [me, cat] = await Promise.all([
    api('GET', `/api/portal/bidder?code=${encodeURIComponent(CODE)}`),
    api('GET', `/api/portal/catalog?code=${encodeURIComponent(CODE)}`),
  ]);
  $('#portal-view').innerHTML = `
    <div class="greeting">
      <h2>Welcome back, ${esc(me.name.split(' ')[0])}</h2>
      <p class="sub">${me.taxExempt ? 'Tax-exempt buyer · ' : ''}This is your account with Brinkley Auctions.</p>
    </div>
    ${statTiles([
      ['Balance due', money(me.balanceDue), me.balanceDue > 0 ? 'warn' : 'good'],
      ['Lots won', me.purchases.length],
      ['Lifetime hammer', money(me.lifetimeHammer)],
      ['My absentee bids', me.absenteeBids.length],
    ])}
    ${me.balanceDue > 0 ? `<div class="panel" style="margin-bottom:14px"><h3>Please settle up</h3>
      <p class="sub">You have an outstanding balance of <strong>${money(me.balanceDue)}</strong>. Please contact the office or stop by to pay.</p></div>` : ''}
    <h3 style="margin-top:20px">Upcoming auctions — browse & bid</h3>
    ${renderCatalog(cat)}
    <h3 style="margin-top:20px">My invoices</h3>
    ${me.invoices.length ? me.invoices.map((i) => `
      <div class="panel" style="margin-bottom:10px">
        <div class="lot-card" style="border:none;padding:0 0 6px">
          <div class="lot-main"><strong>INV-${i.number}</strong> — ${esc(i.auction.title)}
            <div class="sub">${new Date(i.createdAt).toLocaleDateString()}</div></div>
          <div class="lot-side">${badge(i.status)}<div><strong>${money(i.total)}</strong></div>
            ${i.balance > 0 ? `<div class="sub">balance ${money(i.balance)}</div>` : ''}</div>
        </div>
        <details class="bids"><summary>${i.lineItems.length} lot${i.lineItems.length === 1 ? '' : 's'} · details</summary>
          ${i.lineItems.map((li) => `<div class="bid-row"><span>Lot ${li.lotNumber} — ${esc(li.title)}${li.quantity > 1 ? ` × ${li.quantity}` : ''}</span><span>${money(li.amount)}</span></div>`).join('')}
          <div class="bid-row"><span>Buyer's premium (${i.premiumPct}%)</span><span>${money(i.premium)}</span></div>
          ${i.tax ? `<div class="bid-row"><span>Sales tax (${i.taxPct}%)</span><span>${money(i.tax)}</span></div>` : ''}
          ${i.payments.map((p) => `<div class="bid-row pay"><span>Paid — ${esc(p.method)} ${new Date(p.time).toLocaleDateString()}</span><span>−${money(p.amount)}</span></div>`).join('')}
        </details>
      </div>`).join('') : '<p class="sub">No invoices yet.</p>'}
    <h3 style="margin-top:20px">My absentee bids</h3>
    ${me.absenteeBids.length ? `<div class="panel">${me.absenteeBids.map((b) => `
      <div class="lot-card">
        <div class="lot-main">Lot ${b.lotNumber} — ${esc(b.title)}<div class="sub">${esc(b.auction.title)}</div></div>
        <div class="lot-side">${money(b.amount)}
          <div>${b.lotStatus === 'open' ? badge('open') : b.won ? badge('sold') + ' <span class="mybid">you won!</span>' : badge(b.lotStatus)}</div>
        </div>
      </div>`).join('')}</div>` : '<p class="sub">No absentee bids yet — browse the catalog above to place one.</p>'}
    <h3 style="margin-top:20px">Purchase history</h3>
    ${me.purchases.length ? `<div class="panel">${me.purchases.map((p) => `
      <div class="lot-card">
        <div class="lot-main">Lot ${p.lotNumber} — ${esc(p.title)}${p.quantity > 1 ? ` × ${p.quantity}` : ''}<div class="sub">${esc(p.auction.title)}</div></div>
        <div class="lot-side"><strong>${money(p.amount)}</strong></div>
      </div>`).join('')}</div>` : '<p class="sub">No purchases yet.</p>'}`;
}

function renderCatalog(cat) {
  if (!cat.auctions.length) return '<p class="sub">No upcoming auctions right now — check back soon.</p>';
  return cat.auctions.map((a) => {
    const open = a.lots.filter((l) => l.status === 'open');
    return `<details class="auction-cat" ${a.status === 'live' ? 'open' : ''}>
      <summary>${esc(a.title)} ${badge(a.status)} <span class="sub">${fmtDate(a.date)}${a.location ? ' · ' + esc(a.location) : ''} · ${open.length} lot${open.length === 1 ? '' : 's'} open · ${a.premiumPct}% buyer's premium</span></summary>
      <div>${open.length ? open.map((l) => `
        <div class="lot-card">
          <div class="lot-main">
            <strong>Lot ${l.lotNumber} — ${esc(l.title)}</strong>${l.quantity > 1 ? ` <span class="badge qty">× ${l.quantity} — bid is per item</span>` : ''}
            ${l.description ? `<div class="sub">${esc(l.description)}</div>` : ''}
            <div class="sub">${esc(l.category)}${l.absenteeCount ? ` · ${l.absenteeCount} absentee bid${l.absenteeCount === 1 ? '' : 's'} in` : ''}</div>
            ${l.myBid ? `<div class="mybid">Your bid: ${money(l.myBid)}</div>` : ''}
          </div>
          <div class="lot-side">
            <div class="sub">Starts at</div><strong>${money(l.startingBid)}</strong>
            ${cat.canBid ? `<div style="margin-top:6px"><button class="small primary" data-bid="${l.id}" data-title="Lot ${l.lotNumber} — ${esc(l.title)}" data-my="${l.myBid || ''}">${l.myBid ? 'Raise bid' : 'Absentee bid'}</button></div>` : ''}
          </div>
        </div>`).join('') : '<p class="sub" style="padding:10px 0">All lots in this auction have been hammered.</p>'}
      </div>
    </details>`;
  }).join('');
}

// ---- consignor portal ----
async function renderConsignorPortal() {
  const me = await api('GET', `/api/portal/consignor?code=${encodeURIComponent(CODE)}`);
  $('#portal-view').innerHTML = `
    <div class="greeting">
      <h2>Welcome back, ${esc(me.name)}</h2>
      <p class="sub">Seller account ${esc(me.code)} · your commission rate is ${me.commissionPct}%.</p>
    </div>
    ${statTiles([
      ['Items consigned', me.totals.consigned],
      ['Sold', me.totals.sold],
      ['Gross hammer', money(me.totals.gross), 'good'],
      ['Paid to you', money(me.totals.netPaid)],
      ['Owed to you now', money(me.totals.owedNow), me.totals.owedNow > 0 ? 'warn' : ''],
    ])}
    <h3 style="margin-top:20px">My settlements</h3>
    ${me.settlements.length ? me.settlements.map((s) => `
      <div class="panel" style="margin-bottom:10px">
        <div class="lot-card" style="border:none;padding:0">
          <div class="lot-main"><strong>ST-${s.number}</strong> — ${esc(s.auction.title)}
            <div class="sub">${s.status === 'paid' ? `Paid by ${esc(s.method)} on ${new Date(s.paidAt).toLocaleDateString()}` : 'Payment being prepared'}</div></div>
          <div class="lot-side">${badge(s.status)}
            <div class="sub">gross ${money(s.grossHammer)} − ${s.commissionPct}%</div>
            <div><strong>${money(s.netDue)}</strong></div></div>
        </div>
      </div>`).join('') : '<p class="sub">No settlements yet — statements appear here after your items sell.</p>'}
    <h3 style="margin-top:20px">My items</h3>
    ${me.lotsByAuction.length ? me.lotsByAuction.map((g) => `
      <details class="auction-cat" open>
        <summary>${esc(g.auction.title)} ${badge(g.auction.status)} <span class="sub">${fmtDate(g.auction.date)}</span></summary>
        <div>${g.lots.map((l) => `
          <div class="lot-card">
            <div class="lot-main">Lot ${l.lotNumber} — ${esc(l.title)}${l.quantity > 1 ? ` × ${l.quantity}` : ''}</div>
            <div class="lot-side">${badge(l.status)} ${l.amount !== null ? `<strong>${money(l.amount)}</strong>` : ''}</div>
          </div>`).join('')}
        </div>
      </details>`).join('') : '<p class="sub">No items consigned yet.</p>'}`;
}

// ---- absentee bidding ----
let bidLotId = null;
document.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-bid]');
  if (!btn) return;
  bidLotId = btn.dataset.bid;
  $('#bid-title').textContent = btn.dataset.title;
  $('#bid-context').textContent = btn.dataset.my
    ? `Your current bid is ${money(btn.dataset.my)} — enter a higher amount.`
    : 'Enter the most you are willing to pay.';
  $('#bid-form').elements.amount.value = '';
  $('#bid-modal').showModal();
});
$('#bid-cancel').addEventListener('click', () => $('#bid-modal').close());
$('#bid-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const amount = e.target.elements.amount.value;
  $('#bid-modal').close();
  try {
    const r = await api('POST', '/api/portal/absentee', { code: CODE, lotId: bidLotId, amount });
    toast(`Bid of ${money(r.amount)} placed on lot ${r.lotNumber}. Good luck!`);
    renderBidderPortal();
  } catch (err) {
    toast(err.message, true);
  }
});

// ---- boot ----
(async function boot() {
  try {
    const res = await fetch('/api/auth-status');
    const ct = res.headers.get('content-type') || '';
    if (!res.ok || !ct.includes('json')) throw 0;
  } catch {
    if (typeof createBrinkleyCore === 'function' && window.BRINKLEY_DEMO_DB) showDemoHintCodes();
  }
  if (CODE) {
    try { await signIn(CODE); } catch { localStorage.removeItem('brinkley-portal-code'); }
  }
})();
</script>
</body>
</html>
